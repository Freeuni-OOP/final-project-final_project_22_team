services:
  mysql:
    image: mysql:8.3
    container_name: quizdb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: quizdb
      MYSQL_USER: quizuser
      MYSQL_PASSWORD: quizpass
    ports:
      - "3306:3306"
    volumes:
      # any .sql file dropped here runs automatically on first container start
      - ./db/quiz_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
